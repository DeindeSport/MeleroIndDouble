<!DOCTYPE html>

<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AR Viewer</title>

<script type="module"
src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

<style>

body{
margin:0;
background:#f2f2f2;
font-family:Arial;
text-align:center;
}

model-viewer{
width:100%;
height:100vh;
background:white;
}

</style>

</head>

<body>

<model-viewer
src="./MeleroIndDouble.glb"
ios-src="./MeleroIndDouble.usdz"
ar
ar-modes="scene-viewer quick-look webxr"
camera-controls
auto-rotate
shadow-intensity="1"
environment-image="neutral">

</model-viewer>

</body>
</html>
